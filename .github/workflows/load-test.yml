name: Load Tests

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  load-test:
    name: k6 Smoke Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: freelanceFlow
          POSTGRES_PASSWORD: freelanceFlow_test
          POSTGRES_DB: freelanceFlow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://freelanceFlow:freelanceFlow_test@localhost:5432/freelanceFlow_test
      JWT_SECRET: load_test_jwt_secret_not_for_production
      JWT_EXPIRES_IN: 24h
      NODE_ENV: test
      PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync database schema
        run: |
          node -e '
            require("dotenv").config();
            const { sequelize } = require("./src/models/index");
            sequelize.sync({ force: true })
              .then(() => { console.log("DB synced"); process.exit(0); })
              .catch((e) => { console.error(e); process.exit(1); });
          '

      - name: Seed load test data
        run: node tests/loads/seed.js

      - name: Start API server
        run: node server.js &

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/health && echo "API ready" && break
            echo "Waiting for API... ($i/15)"
            sleep 2
          done

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run smoke test
        run: k6 run --out web-dashboard=export=report.html --env PROFILE=smoke --env BASE_URL=http://localhost:3000 tests/loads/main.js

      - name: Upload k6 HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-report
          path: report.html
